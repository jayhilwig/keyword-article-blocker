<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keyword Article Blocker</title>
    <style>
      body { font: 13px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 12px; width: 280px; }
      .row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
      .muted { opacity: 0.75; }
      button { cursor: pointer; border: 1px solid rgba(0,0,0,.25); background: white; border-radius: 10px; padding: 8px 10px; font: inherit; }
      button:hover { background: rgba(0,0,0,.05); }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div><strong>Keyword Article Blocker</strong></div>
    <div class="muted" id="siteLine" style="margin-top:4px;">…</div>

    <div class="row">
      <div>Enabled on this site</div>
      <input type="checkbox" id="siteToggle" />
    </div>

    <div class="row">
      <button id="openOptions">Manage rules</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
